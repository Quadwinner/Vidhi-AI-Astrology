# A string used to distinguish different Supabase projects on the same host.
project_id = "aura-ai-backend"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true

# Use env SITE_URL for flexibility; local CLI reads env at runtime
site_url = "env(SITE_URL)"
additional_redirect_urls = ["env(ADDITIONAL_REDIRECT_URLS)"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[functions.create-payment-session]
verify_jwt = false

[functions.create-customer-portal-session]
verify_jwt = false

[functions.razorpay-webhook]
verify_jwt = false

[functions.create-topup-session]
verify_jwt = false

[functions.admin-operations]
verify_jwt = false

[functions.firebase-auth-exchange-2]
verify_jwt = false

[functions.whatsapp-webhook]
verify_jwt = false
[functions.create-ultravox-call]
enabled = true
verify_jwt = true
import_map = "./functions/create-ultravox-call/deno.json"
entrypoint = "./functions/create-ultravox-call/index.ts"

[functions.initiate-agora-call]
enabled = true
verify_jwt = true
import_map = "./functions/initiate-agora-call/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/initiate-agora-call/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/initiate-agora-call/*.html" ]

