<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vidhi logo">
  <defs>
    <radialGradient id="vidhiDisc" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#d4276a"/>
      <stop offset="60%" stop-color="#a81d52"/>
      <stop offset="100%" stop-color="#7d1440"/>
    </radialGradient>
    <linearGradient id="vidhiGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3D07A"/>
      <stop offset="55%" stop-color="#E5B45B"/>
      <stop offset="100%" stop-color="#C7902F"/>
    </linearGradient>
  </defs>

  <!-- Bright outer ring for visibility on dark backgrounds -->
  <circle cx="32" cy="32" r="31.5" fill="none" stroke="#F3D07A" stroke-width="2.5"/>
  <!-- Celestial disc (brighter for favicon visibility) -->
  <circle cx="32" cy="32" r="30" fill="url(#vidhiDisc)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#vidhiGold)" stroke-width="1.5" stroke-opacity="0.85"/>

  <!-- Crescent moon -->
  <path d="M41.5 15.5a19 19 0 1 0 6.8 22.7A15.2 15.2 0 0 1 41.5 15.5z" fill="url(#vidhiGold)"/>

  <!-- Four-point sparkle -->
  <path d="M27 24.5c.9 3.9 2.1 5.1 6 6-3.9.9-5.1 2.1-6 6-.9-3.9-2.1-5.1-6-6 3.9-.9 5.1-2.1 6-6z" fill="#FFF4DD"/>

  <!-- Stars -->
  <circle cx="20" cy="42" r="1.4" fill="#F3D07A"/>
  <circle cx="43" cy="46" r="1.1" fill="#F3D07A" fill-opacity="0.9"/>
  <circle cx="46" cy="24" r="0.9" fill="#FFF4DD"/>
</svg>
